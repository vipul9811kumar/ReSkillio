steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build-image
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/reskillio:latest
      - .

  - name: 'gcr.io/cloud-builders/docker'
    id: push-image
    args:
      - push
      - gcr.io/$PROJECT_ID/reskillio:latest
    waitFor:
      - build-image

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-cloud-run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - reskillio
      - --image=gcr.io/$PROJECT_ID/reskillio:latest
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=4Gi
      - --cpu=2
      - --min-instances=1
      - --timeout=300
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID
    waitFor:
      - push-image

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
